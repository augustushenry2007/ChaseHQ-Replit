kind = "mobile"
previewPath = "/"
title = "ChaseHQ"
version = "1.0.0"
id = "artifacts/chasehq"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23238

[services.development]
run = "pnpm --filter @workspace/chasehq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chasehq", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/chasehq", "run", "serve" ]

[services.env]
PORT = "23238"
BASE_PATH = "/"
